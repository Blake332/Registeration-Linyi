<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendee Directory</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .directory-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .directory-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .directory-header p {
            color: var(--text-secondary);
        }
        .directory-search-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }
        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            fill: var(--text-secondary);
            width: 20px;
            height: 20px;
        }
        .search-field {
            padding-left: 3rem;
            height: 3.5rem;
            font-size: 1.1rem;
            border-radius: 12px;
        }
        .directory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .directory-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            height: 100%;
        }
        .directory-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            gap: 0.5rem;
        }
        .directory-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
        }
        .directory-company {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .directory-company svg {
            fill: var(--text-secondary);
            width: 14px;
            height: 14px;
        }
        .directory-footer {
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .sector-tag {
            background: rgba(139, 92, 246, 0.15);
            color: var(--primary);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            border: 1px solid rgba(139, 92, 246, 0.2);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-actions">
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                <span>Back</span>
            </a>
            <span style="color: var(--border-color)">|</span>
            <span class="logo-text" style="font-size: 1.2rem; font-weight: 700;" data-i18n="dir_title">Attendee Directory</span>
        </div>
        <div class="lang-toggle">
            <button id="lang-en" class="lang-btn active">EN</button>
            <button id="lang-zh" class="lang-btn">中文</button>
        </div>
    </header>

    <div class="container">
        <div class="directory-header">
            <h1 class="gradient-text" data-i18n="dir_title">Attendee Directory</h1>
            <p data-i18n="dir_subtitle">List of registered participants (Read-Only)</p>
        </div>

        <!-- Search Bar -->
        <div class="directory-search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="directory-search" class="form-control search-field" data-i18n="dir_placeholder" placeholder="Filter registered attendees by name, company, or sector...">
        </div>

        <!-- Total Count Badge - digits stay numbers -->
        <div style="margin-bottom: 2rem; color: var(--text-secondary); font-size: 0.95rem;">
            <span data-i18n="search_total">Registered Database</span>: <strong id="directory-total-count" style="color: #fff;">0</strong>
        </div>

        <!-- Directory Cards Grid -->
        <div id="directory-grid-container" class="directory-grid">
            <!-- Populated dynamically by JS -->
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/directory.js"></script>
</body>
</html>
